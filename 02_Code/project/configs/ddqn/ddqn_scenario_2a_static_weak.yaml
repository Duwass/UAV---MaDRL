env_config: configs/scenario_2a_static_jammer_weak.yaml

training:
  total_episodes: 1000
  max_steps_per_episode: 200
  eval_interval_episodes: 50
  eval_episodes: 20
  save_interval_episodes: 100
  seed: 42

ddqn:
  state_type: concat_global_local
  hidden_sizes: [256, 256]
  layer_norm: false
  learning_rate: 0.001
  gamma: 0.99
  batch_size: 128
  replay_capacity: 100000
  min_replay_size: 1000
  target_update_steps: 1000
  gradient_clip_norm: 10.0
  epsilon_start: 1.0
  epsilon_end: 0.05
  epsilon_decay_steps: 50000

logging:
  output_prefix: ddqn_scenario_2a_static_weak
  save_frame_logs: false
  save_checkpoints: true

