simulation:
  seed: 42
  area_width: 500
  area_height: 500
  frame_length: 10
  episode_length: 200
  max_steps: 200

network:
  num_uav: 2
  num_iot: 10
  num_jammer: 1
  num_rf_sources: 1

iot:
  queue_capacity: 20
  energy_capacity: 15
  packet_arrival_prob: 0.05
  backscatter_packets_per_slot: 1
  active_packets_per_slot: 2
  harvested_energy_per_busy_slot: 1
  active_energy_cost_per_slot: 1
  initial_energy_min: 4
  initial_energy_max: 8

uav:
  altitude: 100
  max_speed: 20
  coverage_radius: 220
  initial_energy: 1000
  movement_energy_cost: 0.1
  communication_energy_cost: 0.05
  collision_distance: 20

channel:
  noise_power: 1.0e-9
  path_loss_exponent: 2.2
  tx_power_iot: 0.1
  tx_power_rf_source: 1.0
  backscatter_tx_power_factor: 0.03
  sinr_threshold: 1.0
  primary_busy_prob: 0.55
  allow_active_when_busy: false

jammer:
  enabled: true
  mobility: "static"
  power: 0.5
  speed: 0
  radius: 180

reward:
  w_throughput: 1.0
  w_drop: 2.0
  w_delay: 0.1
  w_uav_energy: 0.01
  w_jamming: 1.0
  w_collision: 5.0
  w_unfairness: 0.2
  w_avoid_jammer: 0.2

evaluation:
  num_episodes: 20
  save_csv: true
  save_plots: true

action_masking:
  enabled: true
  random_uses_mask: true
